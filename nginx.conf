# Snippet para /etc/nginx/sites-available/proyectos
# Ejecutar setup-ssl.sh una vez antes de aplicar este bloque HTTPS

# Redirige HTTP → HTTPS
server {
    listen 80;
    server_name _;
    # Permite Let's Encrypt si en el futuro se añade dominio
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/trading.crt;
    ssl_certificate_key /etc/nginx/ssl/trading.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;

    # ── Trading frontend ──────────────────────────────────────────
    location /trading/ {
        root /var/www/projects;
        try_files $uri $uri/ /trading/index.html;
    }

    # ── Trading API ───────────────────────────────────────────────
    location /api/trading/ {
        proxy_pass         http://127.0.0.1:3007/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Cookie            $http_cookie;
    }

    # ── Otros proyectos (mantener los bloques existentes aquí) ────
}
